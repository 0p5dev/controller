apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: controller-pipeline
description: A pipeline to deploy the 0p5.dev controller to Cloud Run
serialPipeline:
  stages:
  - targetId: staging
    profiles: [staging]
    strategy:
      standard:
        postdeploy:
          tasks:
          - type: container
            env:
              SERVICE_NAME: "${{ render.metadata.cloud_run.service.name }}"
              REGION: "${{ cloud_run.location }}"
            image: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
            command: ["gcloud"]
            args:
              - run
              - services
              - add-iam-policy-binding
              - ${SERVICE_NAME}
              - --region=${REGION}
              - --member=allUsers
              - --role=roles/run.invoker
  - targetId: production
    profiles: [production]
---

apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: staging
description: Cloud Run staging service
run:
  location: projects/local-first-476300/locations/us-central1
executionConfigs:
  - usages:
    - RENDER
    - DEPLOY
    - POSTDEPLOY
    serviceAccount: cloud-build-sa@local-first-476300.iam.gserviceaccount.com
---

apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: production
description: Cloud Run production service
run:
  location: projects/local-first-476300/locations/us-central1
